services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kjri_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rag_kjri}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./rag_kjri_dubai.sql:/docker-entrypoint-initdb.d/01_rag_kjri_dubai.sql:ro
      - ./migrations/001_chat_sessions.sql:/docker-entrypoint-initdb.d/02_chat_sessions.sql:ro
      - ./migrations/002_pengguna.sql:/docker-entrypoint-initdb.d/03_pengguna.sql:ro
      - ./migrations/003_rag_phase0.sql:/docker-entrypoint-initdb.d/04_rag_phase0.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rag_kjri}"]
      interval: 10s
      timeout: 5s
      retries: 5

  toolbox:
    image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:0.28.0
    container_name: kjri_toolbox
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rag_kjri}
      GOOGLE_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "5001:5000"
    volumes:
      - ./toolbox/config:/config
    command: ["--tools-file", "/config/tools.yaml", "--address", "0.0.0.0"]
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kjri_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  chromadb:
    image: chromadb/chroma:latest
    container_name: kjri_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: ""
      CHROMA_SERVER_AUTH_PROVIDER: ""
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/localhost/8000) 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kjri_agent
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-8000}:8000"
    environment:
      OLLAMA_API_BASE: http://host.docker.internal:11434
      TOOLBOX_URL: http://toolbox:5000
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:0.5b}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CHROMA_URL: http://chromadb:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - toolbox
      - chromadb

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.telegram
    container_name: kjri_telegram_bot
    restart: unless-stopped
    ports:
      - "${TELEGRAM_BOT_PORT:-8080}:8080"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-}
      NGROK_API: http://ngrok:4040
      OLLAMA_API_BASE: http://host.docker.internal:11434
      TOOLBOX_URL: http://toolbox:5000
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:0.5b}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - toolbox

  ngrok:
    image: ngrok/ngrok:latest
    container_name: kjri_ngrok
    restart: unless-stopped
    ports:
      - "4040:4040"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    # Tunnel ke telegram-bot agar webhook Telegram bisa menerima public URL
    # Ganti ke "http://agent:8000" jika butuh public URL untuk web UI
    command: ["http", "http://telegram-bot:8080"]
    depends_on:
      - telegram-bot

volumes:
  postgres_data:
  chromadb_data:
